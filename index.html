<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnePiece Reader</title>
    <link rel="icon" href="OnePiece.svg" type="image/x-icon" />

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#111;
    color:white;
    display:flex;
    flex-direction:column;
    height:100vh;
}
header{
    background:#1e1e1e;
    padding:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    position:relative;
}
#hamburger{
    font-size:24px;
    cursor:pointer;
}
#menu{
    display:none;
    position:absolute;
    top:50px;
    left:0;
    width:100%;
    background:#222;
    flex-direction:column;
    padding:10px;
    gap:10px;
    z-index:10;
}
#menu.show{ display:flex; }
.menu-row{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
}
#viewer{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:auto;
}
#viewer img{
    max-width:100%;
    max-height:100%;
    object-fit:contain;
}
#page-controls{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
    align-items:center;
    padding:10px;
    background:#1e1e1e;
}
button{ padding:6px 12px; font-size:16px; cursor:pointer; }
footer{
    background:#1e1e1e;
    padding:8px;
    text-align:center;
    font-size:14px;
}
@media (max-width:700px){
    #page-controls{ flex-direction:column; }
    .menu-row{ flex-direction:column; }
}

.svgImg{
    height: 25px;
}
span{ padding:6px 12px; font-size:16px; text-align:center; min-width:40px; display:inline-block; }
</style>
</head>
<body>

<header>
    <div id="hamburger"><img src="OnePiece.svg" alt="" class="svgImg"></div>
    <div id="menu">
        <img src="OnePiece.svg" alt="" class="svgImg">
        <div class="menu-row">
            <button onclick="prevVolume(100)">◀ -100</button>
            <button onclick="prevVolume(50)">◀ -50</button>
            <button onclick="prevVolume(10)">◀ -10</button>
            <button onclick="prevVolume(5)">◀ -5</button>
            <button onclick="prevVolume(1)">◀ -1</button>
            <span id="volume-display">001</span>
            <button onclick="nextVolume(1)">+1 ▶</button>
            <button onclick="nextVolume(5)">+5 ▶</button>
            <button onclick="nextVolume(10)">+10 ▶</button>
            <button onclick="nextVolume(50)">+50 ▶</button>
            <button onclick="nextVolume(100)">+100 ▶</button>
        </div>
        <div class="menu-row">
            <button onclick="prevChapter(100)">◀ -100</button>
            <button onclick="prevChapter(50)">◀ -50</button>
            <button onclick="prevChapter(10)">◀ -10</button>
            <button onclick="prevChapter(5)">◀ -5</button>
            <button onclick="prevChapter(1)">◀ -1</button>
            <span id="chapter-display">001</span>
            <button onclick="nextChapter(1)">+1 ▶</button>
            <button onclick="nextChapter(5)">+5 ▶</button>
            <button onclick="nextChapter(10)">+10 ▶</button>
            <button onclick="nextChapter(50)">+50 ▶</button>
            <button onclick="nextChapter(100)">+100 ▶</button>
        </div>
        <button onclick="reloadImage()">Carica</button>
    </div>
</header>

<div id="viewer">
    <img id="mangaImage">
</div>

<div id="page-controls">
    <button onclick="prevPage()">◀ Pagina</button>
    <span id="page-display">1</span>
    <button onclick="nextPage()">Pagina ▶</button>
</div>

<footer>
← → pagina | ↑ ↓ capitolo
</footer>

<script>
const baseURL = "https://onepiecepower.com/manga8/onepiece/volumi/volume{v}/{c}/{p}.jpg";

let volume = parseInt(localStorage.getItem("volume")) || 1;
let chapter = parseInt(localStorage.getItem("chapter")) || 1;
let page = parseInt(localStorage.getItem("page")) || 1;

const img = document.getElementById("mangaImage");
const menu = document.getElementById("menu");
const hamburger = document.getElementById("hamburger");

const volumeDisplay = document.getElementById("volume-display");
const chapterDisplay = document.getElementById("chapter-display");
const pageDisplay = document.getElementById("page-display");


// --- Swipe support per mobile ---
let touchStartX = 0;
let touchEndX = 0;
const swipeThreshold = 50; // distanza minima per considerare swipe

const viewer = document.getElementById("viewer");

viewer.addEventListener("touchstart", function(e){
    touchStartX = e.changedTouches[0].screenX;
}, false);

viewer.addEventListener("touchend", function(e){
    touchEndX = e.changedTouches[0].screenX;
    handleSwipe();
}, false);

function handleSwipe(){
    const deltaX = touchEndX - touchStartX;
    if(Math.abs(deltaX) > swipeThreshold){
        if(deltaX < 0){
            // swipe left → pagina successiva
            nextPage();
        } else {
            // swipe right → pagina precedente
            prevPage();
        }
    }
}

// toggle menu
hamburger.addEventListener("click", ()=> { menu.classList.toggle("show"); });

// costruisce URL con padding 3 cifre
function buildURL(){
    const volStr = String(volume).padStart(3,'0');
    const chapStr = String(chapter).padStart(3,'0');
    const pagStr = String(page).padStart(2,'0');
    return baseURL.replace("{v}", volStr).replace("{c}", chapStr).replace("{p}", pagStr);
}

function saveState(){
    localStorage.setItem("volume", volume);
    localStorage.setItem("chapter", chapter);
    localStorage.setItem("page", page);
}

function updateDisplays(){
    volumeDisplay.textContent = String(volume).padStart(3,'0');
    chapterDisplay.textContent = String(chapter).padStart(3,'0');
    pageDisplay.textContent = page;
}

function reloadImage(){
    img.src = buildURL();
    saveState();
    updateDisplays();
}

// pagine
function nextPage(){ page++; reloadImage(); }
function prevPage(){ if(page>1){ page--; reloadImage(); } }

// gestione volume
function nextVolume(n){
    volume += n;
    if(volume < 1) volume = 1;
    page = 1;
    reloadImage();
}
function prevVolume(n){
    volume -= n;
    if(volume < 1) volume = 1;
    page = 1;
    reloadImage();
}

// gestione capitolo
function nextChapter(n){
    chapter += n;
    if(chapter < 1) chapter = 1;
    page = 1;
    reloadImage();
}
function prevChapter(n){
    chapter -= n;
    if(chapter < 1) chapter = 1;
    page = 1;
    reloadImage();
}

// errore immagine → pagina non può scendere sotto 1
//img.onerror = function(){ if(page>1){ page--; reloadImage();}};

// tastiera
document.addEventListener("keydown", e=>{
    if(e.key==="ArrowRight") nextPage();
    if(e.key==="ArrowLeft") prevPage();
});

reloadImage();
</script>

</body>
</html>
